<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Experiment Log — Plain vs Chain-of-Thought + Persona</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #EEF1EE;
    --paper-line: rgba(27, 36, 48, 0.06);
    --ink: #1B2430;
    --ink-soft: #5B6570;
    --control: #A6743D;
    --control-bg: #F5ECDD;
    --treatment: #1F7A6C;
    --treatment-bg: #E4F1EE;
    --accent: #3B4A6B;
    --card-bg: #FFFFFF;
    --rule: #D8DCD6;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 48px 20px 80px;
    background-color: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, var(--paper-line) 0px, var(--paper-line) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, var(--paper-line) 0px, var(--paper-line) 1px, transparent 1px, transparent 28px);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .sheet { max-width: 860px; margin: 0 auto; }

  header { border-bottom: 2px solid var(--ink); padding-bottom: 20px; margin-bottom: 28px; }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  h1 { font-family: 'Spectral', serif; font-weight: 600; font-size: 32px; line-height: 1.2; margin: 0 0 12px; }

  .meta-row {
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  .meta-row span b { color: var(--ink); font-weight: 600; }

  .presets-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  .presets { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; }

  .preset-btn {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-left: 3px solid var(--accent);
    padding: 9px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--ink);
    max-width: 230px;
    text-align: left;
    cursor: pointer;
    line-height: 1.4;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }

  .preset-btn:hover { transform: translateY(-1px); box-shadow: 0 3px 10px rgba(27,36,48,0.10); }
  .preset-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  #log { display: flex; flex-direction: column; gap: 22px; margin-bottom: 40px; }

  .entry {
    background: var(--card-bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 20px 22px;
    animation: rise 0.35s ease both;
  }

  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .entry-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }

  .entry-head .num { color: var(--accent); font-weight: 600; }

  .question {
    font-family: 'Spectral', serif;
    font-size: 17px;
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 18px;
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--rule);
  }

  .conditions { display: grid; grid-template-columns: 1fr auto 1fr; gap: 18px; align-items: start; }

  .divider { display: flex; align-items: center; justify-content: center; padding-top: 30px; }

  .divider span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    color: #fff;
    background: var(--ink);
    border-radius: 50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.02em;
  }

  .condition { padding: 14px 16px; border-radius: 3px; }
  .condition.control { background: var(--control-bg); border-left: 3px solid var(--control); }
  .condition.treatment { background: var(--treatment-bg); border-left: 3px solid var(--treatment); }

  .cond-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .control .cond-label { color: var(--control); }
  .treatment .cond-label { color: var(--treatment); }
  .cond-tag { opacity: 0.7; font-weight: 400; }

  .cond-body {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    color: var(--ink);
  }

  .cond-body.loading { color: var(--ink-soft); font-style: italic; }
  .cond-body.loading::after { content: '▍'; animation: blink 1s step-start infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  @media (max-width: 640px) {
    .conditions { grid-template-columns: 1fr; }
    .divider { display: none; }
  }

  form { display: flex; gap: 10px; border-top: 2px solid var(--ink); padding-top: 20px; }

  #question-input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    background: var(--card-bg);
    color: var(--ink);
  }

  #question-input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

  button[type=submit] {
    padding: 12px 22px;
    border: none;
    border-radius: 3px;
    background: var(--accent);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  button[type=submit]:hover { background: #2c384f; }
  button[type=submit]:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
</style>
</head>
<body>
<div class="sheet">

  <header>
    <div class="eyebrow">Experiment Log · Prompt Engineering</div>
    <h1>Plain Prompt vs Chain-of-Thought + Persona</h1>
    <div class="meta-row">
      <span>Control: <b>direct prompt</b></span>
      <span>Treatment: <b>CoT instruction + role persona</b></span>
      <span>Measure: <b>correctness &amp; clarity</b></span>
    </div>
  </header>

  <div class="presets-label">Quick experiments — click to run</div>
  <div class="presets" id="presets">
    {% for q in presets %}
      <button class="preset-btn" data-question="{{ q }}">{{ q[:60] }}…</button>
    {% endfor %}
  </div>

  <div id="log"></div>

  <form id="chat-form">
    <input type="text" id="question-input" placeholder="Log a new reasoning question…" required autocomplete="off">
    <button type="submit">Run experiment</button>
  </form>

</div>

<script>
const log = document.getElementById('log');
const form = document.getElementById('chat-form');
const input = document.getElementById('question-input');
let entryCount = 0;

function timestamp() {
  return new Date().toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
}

async function askQuestion(question) {
  entryCount += 1;
  const entryNum = String(entryCount).padStart(4, '0');

  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.innerHTML = `
    <div class="entry-head">
      <span class="num">ENTRY ${entryNum}</span>
      <span>${timestamp()}</span>
    </div>
    <div class="question">${question}</div>
    <div class="conditions">
      <div class="condition control">
        <div class="cond-label"><span>Control</span><span class="cond-tag">plain</span></div>
        <div class="cond-body loading">running</div>
      </div>
      <div class="divider"><span>VS</span></div>
      <div class="condition treatment">
        <div class="cond-label"><span>Treatment</span><span class="cond-tag">CoT + persona</span></div>
        <div class="cond-body loading">running</div>
      </div>
    </div>
  `;
  log.appendChild(entry);
  entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  try {
    const res = await fetch('/api/compare', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    const data = await res.json();
    const plainBody = entry.querySelector('.control .cond-body');
    const cotBody = entry.querySelector('.treatment .cond-body');
    plainBody.textContent = data.plain || data.error || 'No response.';
    cotBody.textContent = data.cot || data.error || 'No response.';
    plainBody.classList.remove('loading');
    cotBody.classList.remove('loading');
  } catch (err) {
    entry.querySelector('.conditions').innerHTML = `<div class="condition">Request failed: ${err}</div>`;
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const question = input.value.trim();
  if (question) {
    askQuestion(question);
    input.value = '';
  }
});

document.querySelectorAll('.preset-btn').forEach((btn) => {
  btn.addEventListener('click', () => askQuestion(btn.dataset.question));
});
</script>
</body>
</html>
